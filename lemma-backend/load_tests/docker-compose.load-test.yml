# Load-test stack for the lemma-backend.
#
# Runs all required infrastructure services plus the API and worker as
# separate services (matching prod topology) with hard resource limits
# that simulate a 2 CPU / 2 GB RAM production server.
#
# Usage (see also `make load-test` in lemma-backend/Makefile):
#
#   # 1. Build the image (from repo root):
#   docker build -t lemma-backend:load-test -f lemma-backend/Dockerfile .
#
#   # 2. Bring up infrastructure + API + worker:
#   docker compose -f load_tests/docker-compose.load-test.yml up -d
#
#   # 3. Provision test data (requires uv / Python on the host):
#   uv run python load_tests/setup.py
#
#   # 4. Start the DB connection monitor (in a separate terminal):
#   uv run python load_tests/db_monitor.py --interval 5
#
#   # 5. Run k6 (reads creds from the generated .env.load_test):
#   docker run --rm --network host \
#     --env-file load_tests/.env.load_test \
#     -v ./load_tests:/scripts \
#     grafana/k6:latest run /scripts/ws_concurrent.js
#
#   # 6. During/after the run, check memory & CPU:
#   docker stats lemma-load-api lemma-load-worker --no-stream
#
#   # 7. Tear down when finished:
#   docker compose -f load_tests/docker-compose.load-test.yml down -v

services:

  db:
    image: docker.io/pgvector/pgvector:0.8.3-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lemma
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - load_test_net

  redis:
    image: docker.io/redis/redis-stack:7.2.0-v19
    networks:
      - load_test_net
    depends_on:
      db:
        condition: service_healthy

  supertokens:
    image: docker.io/supertokens/supertokens-postgresql:11.1.0
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://postgres:postgres@db:5432/supertokens
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - load_test_net

  # ── API service (matches prod: separate pod) ──────────────────────────────
  api:
    image: ${LEMMA_IMAGE:-lemma-backend:load-test}
    container_name: lemma-load-api
    command: ["uvicorn", "app.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lemma
      DATASTORE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lemma_datastore
      REDIS_URL: redis://redis:6379
      SUPERTOKENS_CORE_URL: http://supertokens:3567
      ENVIRONMENT: local
      LOCAL_OBJECT_STORAGE_ROOT: /home/appuser/.local/object-storage
      LOCAL_FILE_STORAGE_ROOT: /home/appuser/.local/files
      REDIS_STREAM_POLLING_INTERVAL_MS: 200
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "10"
      DATASTORE_DB_POOL_SIZE: "5"
      DATASTORE_DB_MAX_OVERFLOW: "5"
      WORKER_CONCURRENCY: "20"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      supertokens:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - load_test_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ── Worker service (matches prod: separate pod) ───────────────────────────
  worker:
    image: ${LEMMA_IMAGE:-lemma-backend:load-test}
    container_name: lemma-load-worker
    command: ["streaq", "run", "app.events:streaq_worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lemma
      DATASTORE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lemma_datastore
      REDIS_URL: redis://redis:6379
      SUPERTOKENS_CORE_URL: http://supertokens:3567
      ENVIRONMENT: local
      LOCAL_OBJECT_STORAGE_ROOT: /home/appuser/.local/object-storage
      LOCAL_FILE_STORAGE_ROOT: /home/appuser/.local/files
      REDIS_STREAM_POLLING_INTERVAL_MS: 200
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "10"
      DATASTORE_DB_POOL_SIZE: "5"
      DATASTORE_DB_MAX_OVERFLOW: "5"
      WORKER_CONCURRENCY: "20"
    depends_on:
      db:
        condition: service_healthy
      supertokens:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - load_test_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  load_test_net:
    driver: bridge
