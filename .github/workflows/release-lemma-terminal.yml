name: Release Lemma Terminal CLI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 1.2.3 or v1.2.3"
        required: true

permissions:
  contents: read

concurrency:
  group: release-lemma-terminal-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set package version from release tag
        shell: python
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          import os
          import pathlib
          import re

          version = os.environ["RELEASE_VERSION"].removeprefix("v")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?", version):
              raise SystemExit(f"Invalid semver release tag: {os.environ['RELEASE_VERSION']}")

          path = pathlib.Path("lemma-cli/lemma_cli/__init__.py")
          text = path.read_text()
          text, count = re.subn(
              r'(?m)^__version__ = "[^"]+"$', f'__version__ = "{version}"', text, count=1
          )
          if count != 1:
              raise SystemExit("Could not find __version__ in lemma-cli/lemma_cli/__init__.py")
          path.write_text(text)

          pyproject = pathlib.Path("lemma-cli/pyproject.toml")
          pp_text = pyproject.read_text()
          pp_text, pp_count = re.subn(
              r'(?m)^(\s*)"lemma-sdk>=[^"]+",',
              rf'\g<1>"lemma-sdk>={version}",',
              pp_text,
              count=1,
          )
          if pp_count != 1:
              raise SystemExit("Could not find the lemma-sdk pin in lemma-cli/pyproject.toml")

          # The published CLI wheel resolves lemma-pod-bundle from PyPI (the
          # [tool.uv.sources] path dep only applies in-repo). The bundle is
          # released in LOCKSTEP: it gets the release version too, so a source
          # change can never ship silently unpublished — an independently
          # hand-bumped version combined with --skip-existing would skip the
          # upload whenever someone changed bundle code without remembering
          # the bump, while the CLI floor kept pointing at the stale wheel.
          bundle_pyproject = pathlib.Path("lemma-pod-bundle/pyproject.toml")
          bundle_text, pb_ver_count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              bundle_pyproject.read_text(),
              count=1,
          )
          if pb_ver_count != 1:
              raise SystemExit("Could not find version in lemma-pod-bundle/pyproject.toml")
          bundle_pyproject.write_text(bundle_text)

          pp_text, pb_count = re.subn(
              r'(?m)^(\s*)"lemma-pod-bundle>=[^"]+",',
              rf'\g<1>"lemma-pod-bundle>={version}",',
              pp_text,
              count=1,
          )
          if pb_count != 1:
              raise SystemExit("Could not find the lemma-pod-bundle pin in lemma-cli/pyproject.toml")
          pyproject.write_text(pp_text)

      - name: Vendor agent skills into the package
        run: |
          mkdir -p lemma-cli/lemma_cli/skills
          for d in lemma-skills/*/; do
            if [ -f "$d/SKILL.md" ]; then
              cp -r "$d" "lemma-cli/lemma_cli/skills/"
            fi
          done

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      # lemma-pod-bundle must be on PyPI before the CLI wheel that pins it goes
      # live, so it is built and published first. It is versioned in lockstep
      # with the release tag (stamped above); --skip-existing only guards
      # re-running the same release, never a real change.
      - name: Build pod-bundle package
        working-directory: lemma-pod-bundle
        run: python -m build

      - name: Check pod-bundle distribution
        working-directory: lemma-pod-bundle
        run: python -m twine check dist/*

      - name: Publish pod-bundle package
        working-directory: lemma-pod-bundle
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing dist/*

      - name: Build CLI package
        working-directory: lemma-cli
        run: python -m build

      - name: Verify skills are bundled
        working-directory: lemma-cli
        shell: bash
        run: |
          set -euo pipefail
          count=$(python -c "import zipfile,glob; w=glob.glob('dist/*.whl')[0]; print(sum(1 for n in zipfile.ZipFile(w).namelist() if n.endswith('SKILL.md')))")
          echo "SKILL.md files in wheel: $count"
          test "$count" -ge 1 || { echo 'No skills bundled in the wheel — aborting release.'; exit 1; }

      - name: Check CLI distribution
        working-directory: lemma-cli
        run: python -m twine check dist/*

      - name: Publish CLI package
        working-directory: lemma-cli
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing dist/*
